<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuya Shabbat Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4ade80; }
        input:checked + .slider:before { transform: translateX(22px); }
        .tab-active { background: white; color: #667eea; }
        .tab-inactive { background: rgba(255, 255, 255, 0.2); color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="login-modal" class="fixed inset-0 bg-gray-900 bg-opacity-90 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full m-4">
            <h2 class="text-3xl font-bold text-center text-purple-600 mb-2"><i class="fas fa-home mr-2"></i>Connexion</h2>
            <p class="text-gray-500 text-center mb-6 text-sm">Entrez vos identifiants Tuya IoT Platform.</p>
            <form id="login-form" class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-700 mb-1">Access ID</label><input type="text" id="login-id" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div><label class="block text-xs font-bold text-gray-700 mb-1">Access Secret</label><input type="password" id="login-secret" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div><label class="block text-xs font-bold text-gray-700 mb-1">UID Utilisateur</label><input type="text" id="login-uid" class="w-full px-3 py-2 border rounded-lg" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-gray-700 mb-1">Région</label><select id="login-region" class="w-full px-3 py-2 border rounded-lg"><option value="eu">Europe (eu)</option><option value="us">US (us)</option></select></div>
                    <div><label class="block text-xs font-bold text-gray-700 mb-1">Ville Shabbat</label><input type="text" id="login-city" value="Jerusalem" class="w-full px-3 py-2 border rounded-lg"></div>
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg mt-4 shadow-lg transition-all">Se Connecter</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="max-w-7xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white"><i class="fas fa-menorah mr-3"></i>Dashboard</h1>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow"><i class="fas fa-sign-out-alt mr-2"></i>Déconnexion</button>
        </div>
        
        <div class="flex justify-center mb-6 space-x-2">
            <button onclick="switchTab('manual')" id="tab-manual" class="tab-active px-8 py-3 rounded-lg font-semibold transition-all"><i class="fas fa-hand-pointer mr-2"></i>Contrôle</button>
            <button onclick="switchTab('shabbat')" id="tab-shabbat" class="tab-inactive px-8 py-3 rounded-lg font-semibold transition-all"><i class="fas fa-calendar-alt mr-2"></i>Shabbat</button>
        </div>
        
        <div id="content-manual" class="tab-content">
            <div class="bg-white rounded-xl shadow-2xl p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>Mes Appareils</h2>
                    <button onclick="loadDevices()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg"><i class="fas fa-sync-alt mr-2"></i>Actualiser</button>
                </div>
                <div id="loading" class="text-center py-12 hidden"><i class="fas fa-spinner fa-spin text-4xl text-purple-600"></i><p class="text-gray-600 mt-4">Connexion à Tuya...</p></div>
                <div id="devices-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
        
        <div id="content-shabbat" class="tab-content hidden">
            <div class="bg-gradient-to-r from-blue-900 to-indigo-800 rounded-xl shadow-2xl p-6 mb-6 text-white">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-clock mr-2"></i>Horaires de Shabbat</h2>
                <div id="shabbat-times" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            
            <div class="bg-white rounded-xl shadow-2xl p-6 mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-plus-circle text-green-500 mr-2"></i>Nouvelle Tâche</h2>
                <form id="task-form" class="space-y-4">
                    <div><label class="block font-semibold mb-2">Nom</label><input type="text" id="task-name" class="w-full px-4 py-2 border rounded-lg" required></div>
                    <div><label class="block font-semibold mb-2">Appareil</label><select id="task-device" class="w-full px-4 py-2 border rounded-lg" required></select></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block font-semibold mb-2">Action</label><select id="task-action" class="w-full px-4 py-2 border rounded-lg"><option value="ON">Allumer</option><option value="OFF">Éteindre</option></select></div>
                        <div><label class="block font-semibold mb-2">Heure</label><input type="datetime-local" id="task-time" class="w-full px-4 py-2 border rounded-lg" required></div>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">Programmer</button>
                </form>
            </div>
            
            <div class="bg-white rounded-xl shadow-2xl p-6">
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-list-check text-blue-500 mr-2"></i>Tâches Programmées</h2><button onclick="loadScheduledTasks()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Actualiser</button></div>
                <div id="tasks-container" class="space-y-3"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
